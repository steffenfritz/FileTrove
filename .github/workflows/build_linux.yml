name: Debian - x86_64 Build YARA-X C API and Go Binary

on:
  workflow_dispatch:  # Enable manual triggering

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Task
        uses: go-task/setup-task@0ab1b2a65bc55236a3bc64cde78f80e20e8885c2 # v1
        with:
          version: "3.x"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-c
        run: command -v cargo-cinstall >/dev/null 2>&1 || cargo install cargo-c

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.26.1'

      - name: Cache Go modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Clone YARA-X repository
        run: git clone https://github.com/VirusTotal/yara-x.git

      - name: Build YARA-X C API and locate .pc file
        run: |
          cd yara-x
          git checkout tags/v1.14.0
          cargo cinstall -p yara-x-capi --release --destdir=$HOME/yara_install
          # Find the .pc file location
          PC_FILE=$(find $HOME/yara_install -name yara_x_capi.pc)
          if [ -z "$PC_FILE" ]; then
            echo "Error: yara_x_capi.pc not found"
            exit 1
          fi
          PC_DIR=$(dirname $PC_FILE)
          echo "Found yara_x_capi.pc in $PC_DIR"
          ls -l $PC_DIR

      - name: Set environment variables for pkg-config and Go
        run: |
          PKG_CONFIG_PATH=/home/runner/yara_install/usr/local/lib/x86_64-linux-gnu/pkgconfig
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH" >> $GITHUB_ENV
          echo "CGO_CFLAGS=-I$HOME/yara_install/usr/local/include" >> $GITHUB_ENV
          echo "CGO_LDFLAGS=-L$HOME/yara_install/usr/local/lib/x86_64-linux-gnu" >> $GITHUB_ENV
          export PKG_CONFIG_PATH
          pkg-config --cflags --libs yara_x_capi

      - name: Build Go binaries
        run: task build

      - name: Build packages
        run: |
          task pkg:stage
          task pkg:deb
          task pkg:rpm

      - name: Create artifacts directory
        run: mkdir -p $GITHUB_WORKSPACE/artifacts

      - name: Copy artifacts
        run: |
          cp $HOME/yara_install/usr/local/lib/x86_64-linux-gnu/libyara_x_capi* $GITHUB_WORKSPACE/artifacts/
          cp $GITHUB_WORKSPACE/cmd/ftrove/ftrove $GITHUB_WORKSPACE/artifacts/
          cp $GITHUB_WORKSPACE/cmd/ftrove/ftrove_amd64_linux_static $GITHUB_WORKSPACE/artifacts/
          cp $GITHUB_WORKSPACE/cmd/admftrove/admftrove $GITHUB_WORKSPACE/artifacts/
          cp $GITHUB_WORKSPACE/cmd/admftrove/admftrove_amd64_linux_static $GITHUB_WORKSPACE/artifacts/
          cp $GITHUB_WORKSPACE/dist/*.deb $GITHUB_WORKSPACE/artifacts/
          cp $GITHUB_WORKSPACE/dist/*.rpm $GITHUB_WORKSPACE/artifacts/

      - name: Create archive of artifacts
        run: |
          cd $GITHUB_WORKSPACE/artifacts
          tar -czvf ubuntu_x86_64_artifacts.tar.gz *

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: build-artifacts
          path: ${{ github.workspace }}/artifacts/ubuntu_x86_64_artifacts.tar.gz
