version: '3'

vars:
  NSRL_VERSION: "2026.03.1"
  NSRL_BASE: "https://s3.amazonaws.com/rds.nsrl.nist.gov/RDS/rds_{{.NSRL_VERSION}}"
  NSRL_FPR: "0.0001"
  NSRL_WORK: "./tmp/nsrl"

tasks:
  download-modern:
    desc: Download NSRL Modern Minimal RDS (SQLite)
    cmds:
      - mkdir -p {{.NSRL_WORK}}/modern
      - curl -L -o {{.NSRL_WORK}}/rds_modern_minimal.zip {{.NSRL_BASE}}/RDS_{{.NSRL_VERSION}}_modern_minimal.zip
      - unzip -o {{.NSRL_WORK}}/rds_modern_minimal.zip -d {{.NSRL_WORK}}/modern
      - sqlite3 {{.NSRL_WORK}}/modern/*.db "SELECT sha1 FROM DISTINCT_HASH;" > {{.NSRL_WORK}}/sha1_modern.txt
    status:
      - test -f {{.NSRL_WORK}}/sha1_modern.txt

  download-android:
    desc: Download NSRL Android Minimal RDS (SQLite)
    cmds:
      - mkdir -p {{.NSRL_WORK}}/android
      - curl -L -o {{.NSRL_WORK}}/rds_android_minimal.zip {{.NSRL_BASE}}/RDS_{{.NSRL_VERSION}}_android_minimal.zip
      - unzip -o {{.NSRL_WORK}}/rds_android_minimal.zip -d {{.NSRL_WORK}}/android
      - sqlite3 {{.NSRL_WORK}}/android/*.db "SELECT sha1 FROM DISTINCT_HASH;" > {{.NSRL_WORK}}/sha1_android.txt
    status:
      - test -f {{.NSRL_WORK}}/sha1_android.txt

  download-ios:
    desc: Download NSRL iOS Minimal RDS (SQLite)
    cmds:
      - mkdir -p {{.NSRL_WORK}}/ios
      - curl -L -o {{.NSRL_WORK}}/rds_ios_minimal.zip {{.NSRL_BASE}}/RDS_{{.NSRL_VERSION}}_ios_minimal.zip
      - unzip -o {{.NSRL_WORK}}/rds_ios_minimal.zip -d {{.NSRL_WORK}}/ios
      - sqlite3 {{.NSRL_WORK}}/ios/*.db "SELECT sha1 FROM DISTINCT_HASH;" > {{.NSRL_WORK}}/sha1_ios.txt
    status:
      - test -f {{.NSRL_WORK}}/sha1_ios.txt

  download-legacy:
    desc: Download NSRL Legacy Minimal RDS (SQLite)
    cmds:
      - mkdir -p {{.NSRL_WORK}}/legacy
      - curl -L -o {{.NSRL_WORK}}/rds_legacy_minimal.zip {{.NSRL_BASE}}/RDS_{{.NSRL_VERSION}}_legacy_minimal.zip
      - unzip -o {{.NSRL_WORK}}/rds_legacy_minimal.zip -d {{.NSRL_WORK}}/legacy
      - sqlite3 {{.NSRL_WORK}}/legacy/*.db "SELECT sha1 FROM DISTINCT_HASH;" > {{.NSRL_WORK}}/sha1_legacy.txt
    status:
      - test -f {{.NSRL_WORK}}/sha1_legacy.txt

  build-modern:
    desc: Build Bloom filter from Modern RDS only (~30-45 MB)
    deps: [download-modern]
    cmds:
      - admftrove --creatensrl {{.NSRL_WORK}}/sha1_modern.txt --nsrlversion "{{.NSRL_VERSION}}-modern" --nsrl-fpr {{.NSRL_FPR}}
      - mv nsrl.bloom db/nsrl.bloom

  build-mobile:
    desc: Build Bloom filter from Modern + Android + iOS (~50-65 MB)
    deps: [download-modern, download-android, download-ios]
    cmds:
      - cat {{.NSRL_WORK}}/sha1_modern.txt {{.NSRL_WORK}}/sha1_android.txt {{.NSRL_WORK}}/sha1_ios.txt | sort -u > {{.NSRL_WORK}}/sha1_combined.txt
      - admftrove --creatensrl {{.NSRL_WORK}}/sha1_combined.txt --nsrlversion "{{.NSRL_VERSION}}-mobile" --nsrl-fpr {{.NSRL_FPR}}
      - mv nsrl.bloom db/nsrl.bloom

  build-all:
    desc: Build Bloom filter from all RDS subsets (~80-110 MB)
    deps: [download-modern, download-android, download-ios, download-legacy]
    cmds:
      - cat {{.NSRL_WORK}}/sha1_*.txt | sort -u > {{.NSRL_WORK}}/sha1_all.txt
      - admftrove --creatensrl {{.NSRL_WORK}}/sha1_all.txt --nsrlversion "{{.NSRL_VERSION}}-all" --nsrl-fpr {{.NSRL_FPR}}
      - mv nsrl.bloom db/nsrl.bloom

  clean:
    desc: Remove NSRL build artifacts
    cmds:
      - rm -rf {{.NSRL_WORK}}
