version: '3'

vars:
  NSRL_VERSION: "2026.03.1"
  NSRL_BASE: "https://s3.amazonaws.com/rds.nsrl.nist.gov/RDS/rds_{{.NSRL_VERSION}}"
  NSRL_FPR: "0.0001"
  NSRL_WORK: "./tmp/nsrl"

tasks:
  check:
    desc: Compare local nsrl.bloom version against configured NSRL_VERSION
    silent: true
    cmds:
      - |
        if [ ! -f db/nsrl.bloom ]; then
          echo "No local nsrl.bloom found. Run one of the build targets."
          exit 0
        fi
        LOCAL=$(./cmd/admftrove/admftrove --nsrl-info db/nsrl.bloom 2>/dev/null | grep '^Version:' | awk '{print $2}')
        echo "Local version:      $LOCAL"
        echo "Configured version: {{.NSRL_VERSION}}"
        if echo "$LOCAL" | grep -q "^{{.NSRL_VERSION}}"; then
          echo "Up to date."
        else
          echo "Update available. Run a build target to rebuild."
        fi

  download-modern:
    desc: Download NSRL Modern Minimal RDS (SQLite)
    interactive: true
    cmds:
      - mkdir -p {{.NSRL_WORK}}/modern
      - curl --progress-bar -L -o {{.NSRL_WORK}}/rds_modern_minimal.zip {{.NSRL_BASE}}/RDS_{{.NSRL_VERSION}}_modern_minimal.zip
      - unzip -o {{.NSRL_WORK}}/rds_modern_minimal.zip -d {{.NSRL_WORK}}/modern
      - sqlite3 -readonly "$(find {{.NSRL_WORK}}/modern -name '*.db' -type f)" "SELECT sha1 FROM DISTINCT_HASH;" > {{.NSRL_WORK}}/sha1_modern.txt
    status:
      - test -f {{.NSRL_WORK}}/sha1_modern.txt

  download-android:
    desc: Download NSRL Android Minimal RDS (SQLite)
    interactive: true
    cmds:
      - mkdir -p {{.NSRL_WORK}}/android
      - curl --progress-bar -L -o {{.NSRL_WORK}}/rds_android_minimal.zip {{.NSRL_BASE}}/RDS_{{.NSRL_VERSION}}_android_minimal.zip
      - unzip -o {{.NSRL_WORK}}/rds_android_minimal.zip -d {{.NSRL_WORK}}/android
      - sqlite3 -readonly "$(find {{.NSRL_WORK}}/android -name '*.db' -type f)" "SELECT sha1 FROM DISTINCT_HASH;" > {{.NSRL_WORK}}/sha1_android.txt
    status:
      - test -f {{.NSRL_WORK}}/sha1_android.txt

  download-ios:
    desc: Download NSRL iOS Minimal RDS (SQLite)
    interactive: true
    cmds:
      - mkdir -p {{.NSRL_WORK}}/ios
      - curl --progress-bar -L -o {{.NSRL_WORK}}/rds_ios_minimal.zip {{.NSRL_BASE}}/RDS_{{.NSRL_VERSION}}_ios_minimal.zip
      - unzip -o {{.NSRL_WORK}}/rds_ios_minimal.zip -d {{.NSRL_WORK}}/ios
      - sqlite3 -readonly "$(find {{.NSRL_WORK}}/ios -name '*.db' -type f)" "SELECT sha1 FROM DISTINCT_HASH;" > {{.NSRL_WORK}}/sha1_ios.txt
    status:
      - test -f {{.NSRL_WORK}}/sha1_ios.txt

  download-legacy:
    desc: Download NSRL Legacy Minimal RDS (SQLite)
    interactive: true
    cmds:
      - mkdir -p {{.NSRL_WORK}}/legacy
      - curl --progress-bar -L -o {{.NSRL_WORK}}/rds_legacy_minimal.zip {{.NSRL_BASE}}/RDS_{{.NSRL_VERSION}}_legacy_minimal.zip
      - unzip -o {{.NSRL_WORK}}/rds_legacy_minimal.zip -d {{.NSRL_WORK}}/legacy
      - sqlite3 -readonly "$(find {{.NSRL_WORK}}/legacy -name '*.db' -type f)" "SELECT sha1 FROM DISTINCT_HASH;" > {{.NSRL_WORK}}/sha1_legacy.txt
    status:
      - test -f {{.NSRL_WORK}}/sha1_legacy.txt

  build-modern:
    desc: "Build Bloom filter from Modern RDS only (~30-45 MB). Requires ~190 GB temp disk space."
    interactive: true
    cmds:
      - task: download-modern
      - ./cmd/admftrove/admftrove --creatensrl {{.NSRL_WORK}}/sha1_modern.txt --nsrlversion "{{.NSRL_VERSION}}-modern" --nsrl-fpr {{.NSRL_FPR}}
      - mkdir -p db && mv nsrl.bloom db/nsrl.bloom
    status:
      - test -f db/nsrl.bloom
      - ./cmd/admftrove/admftrove --nsrl-info db/nsrl.bloom 2>/dev/null | grep -q "^Version:.*{{.NSRL_VERSION}}-modern"

  build-mobile:
    desc: "Build Bloom filter from Modern + Android + iOS (~50-65 MB). Requires ~275 GB temp disk space."
    interactive: true
    cmds:
      - task: download-modern
      - task: download-android
      - task: download-ios
      - cat {{.NSRL_WORK}}/sha1_modern.txt {{.NSRL_WORK}}/sha1_android.txt {{.NSRL_WORK}}/sha1_ios.txt > {{.NSRL_WORK}}/sha1_combined.txt
      - ./cmd/admftrove/admftrove --creatensrl {{.NSRL_WORK}}/sha1_combined.txt --nsrlversion "{{.NSRL_VERSION}}-mobile" --nsrl-fpr {{.NSRL_FPR}}
      - mkdir -p db && mv nsrl.bloom db/nsrl.bloom
    status:
      - test -f db/nsrl.bloom
      - ./cmd/admftrove/admftrove --nsrl-info db/nsrl.bloom 2>/dev/null | grep -q "^Version:.*{{.NSRL_VERSION}}-mobile"

  build-all:
    desc: "Build Bloom filter from all RDS subsets (~80-110 MB). Requires ~350 GB temp disk space."
    interactive: true
    cmds:
      - task: download-modern
      - task: download-android
      - task: download-ios
      - task: download-legacy
      - cat {{.NSRL_WORK}}/sha1_*.txt > {{.NSRL_WORK}}/sha1_all.txt
      - ./cmd/admftrove/admftrove --creatensrl {{.NSRL_WORK}}/sha1_all.txt --nsrlversion "{{.NSRL_VERSION}}-all" --nsrl-fpr {{.NSRL_FPR}}
      - mkdir -p db && mv nsrl.bloom db/nsrl.bloom
    status:
      - test -f db/nsrl.bloom
      - ./cmd/admftrove/admftrove --nsrl-info db/nsrl.bloom 2>/dev/null | grep -q "^Version:.*{{.NSRL_VERSION}}-all"

  clean:
    desc: Remove NSRL build artifacts
    cmds:
      - rm -rf {{.NSRL_WORK}}
