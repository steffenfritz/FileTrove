version: '3'

vars:
  NSRL_VERSION: "2026.03.1"
  NSRL_BASE: "https://s3.amazonaws.com/rds.nsrl.nist.gov/RDS/rds_{{.NSRL_VERSION}}"
  NSRL_FPR: "0.01"
  NSRL_WORK: "./tmp/nsrl"

tasks:
  check:
    desc: Compare local nsrl.bloom version against configured NSRL_VERSION
    silent: true
    cmds:
      - |
        if [ ! -f db/nsrl.bloom ]; then
          echo "No local nsrl.bloom found. Run one of the build targets."
          exit 0
        fi
        LOCAL=$(./cmd/admftrove/admftrove --nsrl-info db/nsrl.bloom 2>/dev/null | grep '^Version:' | awk '{print $2}')
        echo "Local version:      $LOCAL"
        echo "Configured version: {{.NSRL_VERSION}}"
        if echo "$LOCAL" | grep -q "^{{.NSRL_VERSION}}"; then
          echo "Up to date."
        else
          echo "Update available. Run a build target to rebuild."
        fi

  download-modern:
    desc: Download, verify, and extract NSRL Modern Minimal RDS (SQLite)
    interactive: true
    cmds:
      - mkdir -p {{.NSRL_WORK}}/modern
      - curl --progress-bar -L -o {{.NSRL_WORK}}/rds_modern_minimal.zip     {{.NSRL_BASE}}/RDS_{{.NSRL_VERSION}}_modern_minimal.zip
      - curl --progress-bar -L -o {{.NSRL_WORK}}/rds_modern_minimal.zip.sha  {{.NSRL_BASE}}/RDS_{{.NSRL_VERSION}}_modern_minimal.zip.sha
      - |
        EXPECTED=$(awk -F'= ' '{print $2}' {{.NSRL_WORK}}/rds_modern_minimal.zip.sha)
        echo "$EXPECTED  {{.NSRL_WORK}}/rds_modern_minimal.zip" | sha1sum -c
      - unzip -o {{.NSRL_WORK}}/rds_modern_minimal.zip -d {{.NSRL_WORK}}/modern
    status:
      - test -n "$(find {{.NSRL_WORK}}/modern -name '*.db' -type f 2>/dev/null)"

  download-android:
    desc: Download, verify, and extract NSRL Android Minimal RDS (SQLite)
    interactive: true
    cmds:
      - mkdir -p {{.NSRL_WORK}}/android
      - curl --progress-bar -L -o {{.NSRL_WORK}}/rds_android_minimal.zip     {{.NSRL_BASE}}/RDS_{{.NSRL_VERSION}}_android_minimal.zip
      - curl --progress-bar -L -o {{.NSRL_WORK}}/rds_android_minimal.zip.sha  {{.NSRL_BASE}}/RDS_{{.NSRL_VERSION}}_android_minimal.zip.sha
      - |
        EXPECTED=$(awk -F'= ' '{print $2}' {{.NSRL_WORK}}/rds_android_minimal.zip.sha)
        echo "$EXPECTED  {{.NSRL_WORK}}/rds_android_minimal.zip" | sha1sum -c
      - unzip -o {{.NSRL_WORK}}/rds_android_minimal.zip -d {{.NSRL_WORK}}/android
    status:
      - test -n "$(find {{.NSRL_WORK}}/android -name '*.db' -type f 2>/dev/null)"

  download-ios:
    desc: Download, verify, and extract NSRL iOS Minimal RDS (SQLite)
    interactive: true
    cmds:
      - mkdir -p {{.NSRL_WORK}}/ios
      - curl --progress-bar -L -o {{.NSRL_WORK}}/rds_ios_minimal.zip     {{.NSRL_BASE}}/RDS_{{.NSRL_VERSION}}_ios_minimal.zip
      - curl --progress-bar -L -o {{.NSRL_WORK}}/rds_ios_minimal.zip.sha  {{.NSRL_BASE}}/RDS_{{.NSRL_VERSION}}_ios_minimal.zip.sha
      - |
        EXPECTED=$(awk -F'= ' '{print $2}' {{.NSRL_WORK}}/rds_ios_minimal.zip.sha)
        echo "$EXPECTED  {{.NSRL_WORK}}/rds_ios_minimal.zip" | sha1sum -c
      - unzip -o {{.NSRL_WORK}}/rds_ios_minimal.zip -d {{.NSRL_WORK}}/ios
    status:
      - test -n "$(find {{.NSRL_WORK}}/ios -name '*.db' -type f 2>/dev/null)"

  download-legacy:
    desc: Download, verify, and extract NSRL Legacy Minimal RDS (SQLite)
    interactive: true
    cmds:
      - mkdir -p {{.NSRL_WORK}}/legacy
      - curl --progress-bar -L -o {{.NSRL_WORK}}/rds_legacy_minimal.zip     {{.NSRL_BASE}}/RDS_{{.NSRL_VERSION}}_legacy_minimal.zip
      - curl --progress-bar -L -o {{.NSRL_WORK}}/rds_legacy_minimal.zip.sha  {{.NSRL_BASE}}/RDS_{{.NSRL_VERSION}}_legacy_minimal.zip.sha
      - |
        EXPECTED=$(awk -F'= ' '{print $2}' {{.NSRL_WORK}}/rds_legacy_minimal.zip.sha)
        echo "$EXPECTED  {{.NSRL_WORK}}/rds_legacy_minimal.zip" | sha1sum -c
      - unzip -o {{.NSRL_WORK}}/rds_legacy_minimal.zip -d {{.NSRL_WORK}}/legacy
    status:
      - test -n "$(find {{.NSRL_WORK}}/legacy -name '*.db' -type f 2>/dev/null)"

  test:
    desc: Verify db/nsrl.bloom contains all known NSRL hashes from testdata
    cmds:
      - go test -v -count=1 -run TestBloomWithRealNSRL .

  build-modern:
    desc: "Build Bloom filter from Modern RDS only (~150 MB at 1% FPR)."
    interactive: true
    cmds:
      - task: download-modern
      - |
        DB=$(find {{.NSRL_WORK}}/modern -name '*.db' -type f)
        COUNT=$(sqlite3 -readonly "$DB" "SELECT COUNT(*) FROM DISTINCT_HASH;")
        sqlite3 -readonly "$DB" "SELECT sha1 FROM DISTINCT_HASH;" | \
          ./cmd/admftrove/admftrove --creatensrl - --nsrlversion "{{.NSRL_VERSION}}-modern" --nsrl-fpr {{.NSRL_FPR}} --nsrl-estimate "$COUNT"
      - mkdir -p db && mv nsrl.bloom db/nsrl.bloom
      - task: test
    status:
      - test -f db/nsrl.bloom
      - ./cmd/admftrove/admftrove --nsrl-info db/nsrl.bloom 2>/dev/null | grep -q "^Version:.*{{.NSRL_VERSION}}-modern"

  build-mobile:
    desc: "Build Bloom filter from Modern + Android + iOS (~200 MB at 1% FPR)."
    interactive: true
    cmds:
      - task: download-modern
      - task: download-android
      - task: download-ios
      - |
        DB_MODERN=$(find {{.NSRL_WORK}}/modern -name '*.db' -type f)
        DB_ANDROID=$(find {{.NSRL_WORK}}/android -name '*.db' -type f)
        DB_IOS=$(find {{.NSRL_WORK}}/ios -name '*.db' -type f)
        COUNT=$(( \
          $(sqlite3 -readonly "$DB_MODERN"  "SELECT COUNT(*) FROM DISTINCT_HASH;") + \
          $(sqlite3 -readonly "$DB_ANDROID" "SELECT COUNT(*) FROM DISTINCT_HASH;") + \
          $(sqlite3 -readonly "$DB_IOS"     "SELECT COUNT(*) FROM DISTINCT_HASH;") \
        ))
        DB_MODERN="$DB_MODERN" DB_ANDROID="$DB_ANDROID" DB_IOS="$DB_IOS" COUNT="$COUNT" \
        bash -eo pipefail -c '
          { sqlite3 -readonly "$DB_MODERN"  "SELECT sha1 FROM DISTINCT_HASH;"; \
            sqlite3 -readonly "$DB_ANDROID" "SELECT sha1 FROM DISTINCT_HASH;"; \
            sqlite3 -readonly "$DB_IOS"     "SELECT sha1 FROM DISTINCT_HASH;"; \
          } | ./cmd/admftrove/admftrove --creatensrl - \
              --nsrlversion "{{.NSRL_VERSION}}-mobile" --nsrl-fpr {{.NSRL_FPR}} \
              --nsrl-estimate "$COUNT"
        '
      - mkdir -p db && mv nsrl.bloom db/nsrl.bloom
      - task: test
    status:
      - test -f db/nsrl.bloom
      - ./cmd/admftrove/admftrove --nsrl-info db/nsrl.bloom 2>/dev/null | grep -q "^Version:.*{{.NSRL_VERSION}}-mobile"

  build-all:
    desc: "Build Bloom filter from all RDS subsets (~240 MB at 1% FPR)."
    interactive: true
    cmds:
      - task: download-modern
      - task: download-android
      - task: download-ios
      - task: download-legacy
      - |
        DB_MODERN=$(find {{.NSRL_WORK}}/modern -name '*.db' -type f)
        DB_ANDROID=$(find {{.NSRL_WORK}}/android -name '*.db' -type f)
        DB_IOS=$(find {{.NSRL_WORK}}/ios -name '*.db' -type f)
        DB_LEGACY=$(find {{.NSRL_WORK}}/legacy -name '*.db' -type f)
        COUNT=$(( \
          $(sqlite3 -readonly "$DB_MODERN"  "SELECT COUNT(*) FROM DISTINCT_HASH;") + \
          $(sqlite3 -readonly "$DB_ANDROID" "SELECT COUNT(*) FROM DISTINCT_HASH;") + \
          $(sqlite3 -readonly "$DB_IOS"     "SELECT COUNT(*) FROM DISTINCT_HASH;") + \
          $(sqlite3 -readonly "$DB_LEGACY"  "SELECT COUNT(*) FROM DISTINCT_HASH;") \
        ))
        DB_MODERN="$DB_MODERN" DB_ANDROID="$DB_ANDROID" DB_IOS="$DB_IOS" DB_LEGACY="$DB_LEGACY" COUNT="$COUNT" \
        bash -eo pipefail -c '
          { sqlite3 -readonly "$DB_MODERN"  "SELECT sha1 FROM DISTINCT_HASH;"; \
            sqlite3 -readonly "$DB_ANDROID" "SELECT sha1 FROM DISTINCT_HASH;"; \
            sqlite3 -readonly "$DB_IOS"     "SELECT sha1 FROM DISTINCT_HASH;"; \
            sqlite3 -readonly "$DB_LEGACY"  "SELECT sha1 FROM DISTINCT_HASH;"; \
          } | ./cmd/admftrove/admftrove --creatensrl - \
              --nsrlversion "{{.NSRL_VERSION}}-all" --nsrl-fpr {{.NSRL_FPR}} \
              --nsrl-estimate "$COUNT"
        '
      - mkdir -p db && mv nsrl.bloom db/nsrl.bloom
      - task: test
    status:
      - test -f db/nsrl.bloom
      - ./cmd/admftrove/admftrove --nsrl-info db/nsrl.bloom 2>/dev/null | grep -q "^Version:.*{{.NSRL_VERSION}}-all"

  clean:
    desc: Remove NSRL build artifacts
    cmds:
      - rm -rf {{.NSRL_WORK}}
