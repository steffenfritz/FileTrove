version: '3'

vars:
  VERSION:
    sh: cat $(git rev-parse --show-toplevel)/VERSION
  GIT_COMMIT:
    sh: git log -n 1 --format=%h

env:
  CGO_ENABLED: "1"

includes:
  yara: ../../Taskfile.yara.yml

tasks:
  build:
    desc: Build ftrove binaries (both dynamic and static)
    deps: [yara:setup-capi]
    cmds:
      # 1. Build standard dynamic binary
      # -gcflags="-m" is used to print optimization decisions (inlining/escape analysis)
      - go build -gcflags="-m" -buildmode=pie -ldflags "-X main.Version={{.VERSION}}+{{.GIT_COMMIT}} -w -s" -o ftrove
      # 2. Build static binary
      - task: build-static
    generates:
      - ftrove

  build-static:
    desc: Build a statically linked ftrove binary (Linux and macOS only; Windows lacks a static yara-x-capi library)
    platforms: [linux, darwin]
    deps: [yara:setup-capi]
    cmds:
      # -tags static_link is required for yara-x go bindings to use --static pkg-config
      # The extra -extldflags libs are required by CGO (go-sqlite3, yara-x-capi) when linking statically on Linux
      - |
        if [ "{{OS}}" = "linux" ]; then
          go build -tags static_link -ldflags "-X main.Version={{.VERSION}}+{{.GIT_COMMIT}} -w -s -extldflags '-static -lm -ldl -lpthread -lrt -lutil'" -o ftrove_{{ARCH}}_{{OS}}_static
        else
          go build -tags static_link -ldflags "-X main.Version={{.VERSION}}+{{.GIT_COMMIT}} -w -s" -o ftrove_{{ARCH}}_{{OS}}_static
        fi
    generates:
      - ftrove_{{ARCH}}_{{OS}}_static

  changetest:
    desc: Full integration test - build, install, scan testdata, inspect DB, clean
    cmds:
      - go test -v ../../
      - task: build
      - ./ftrove --install .
      - ./ftrove -i ../../testdata -d ../../testdata/dublincore_ex.json -e -p "testing a change. full test." -z "Europe/Berlin"
      - ./ftrove -l
      - sqlite3 db/filetrove.db "select * from files;" ".exit"
      - sqlite3 db/filetrove.db "select * from directories;" ".exit"
      - task: clean

  build-linux-amd:
    desc: Cross-compile for Linux amd64 using zig
    deps: [yara:setup-capi]
    cmds:
      # zig cc is used as the C cross-compiler because it bundles its own sysroot and supports CGO cross-compilation without a separate toolchain
      - go build -buildmode=pie -ldflags "-X main.Version={{.VERSION}}+{{.GIT_COMMIT}} -w -s" -o ftrove_linux
    env:
      GOOS: "linux"
      GOARCH: "amd64"
      CC: "zig cc -target x86_64-linux-musl"
      CXX: "zig cc -target x86_64-linux-musl"

  build-windows-amd:
    desc: Cross-compile for Windows amd64 using zig
    deps: [yara:setup-capi]
    cmds:
      # zig cc is used as the C cross-compiler because it bundles its own sysroot and supports CGO cross-compilation without a separate toolchain
      - go build -buildmode=pie -ldflags "-X main.Version={{.VERSION}}+{{.GIT_COMMIT}} -w -s" -o ftrove.exe
    env:
      GOOS: "windows"
      GOARCH: "amd64"
      CC: "zig cc -target x86_64-windows-musl"
      CXX: "zig cc -target x86_64-windows-musl"

  setup_mac:
    desc: Install all development dependencies on macOS and build the YARA-X C library
    cmds:
      - command -v go          >/dev/null 2>&1 || brew install go
      - command -v cargo       >/dev/null 2>&1 || brew install rust
      - command -v zig         >/dev/null 2>&1 || brew install zig
      - command -v sqlite3     >/dev/null 2>&1 || brew install sqlite
      - command -v pkg-config  >/dev/null 2>&1 || brew install pkg-config
      - command -v cargo-cinstall >/dev/null 2>&1 || cargo install cargo-c
      - |
        if [ ! -d "$HOME/yara-x" ]; then
          git clone --depth 1 --branch v1.14.0 https://github.com/VirusTotal/yara-x.git $HOME/yara-x
        fi
      - |
        if [ ! -d "$HOME/yara_install" ]; then
          cd $HOME/yara-x
          cargo cinstall -p yara-x-capi --release --destdir=$HOME/yara_install
        fi
      - |
        PC_FILE=$(find $HOME/yara_install -name yara_x_capi.pc | head -1)
        PC_DIR=$(dirname "$PC_FILE")
        LIB_DIR=$(find $HOME/yara_install -name "libyara_x_capi*" -exec dirname {} \; | head -1)
        echo "PKG_CONFIG_PATH=$PC_DIR" > .yara_env
        PREFIX=$(PKG_CONFIG_PATH=$PC_DIR pkg-config --variable=prefix yara_x_capi)
        echo "CGO_CFLAGS=-I$HOME/yara_install$PREFIX/include" >> .yara_env
        echo "CGO_LDFLAGS=-L$LIB_DIR" >> .yara_env
        echo "Setup complete. YARA-X env written to cmd/ftrove/.yara_env and will be auto-loaded by task."

  setup_linux:
    desc: Install all development dependencies on Debian/Ubuntu and build the YARA-X C library
    cmds:
      - |
        pkgs=""
        command -v gcc        >/dev/null 2>&1 || pkgs="$pkgs build-essential"
        command -v git        >/dev/null 2>&1 || pkgs="$pkgs git"
        command -v curl       >/dev/null 2>&1 || pkgs="$pkgs curl"
        command -v pkg-config >/dev/null 2>&1 || pkgs="$pkgs pkg-config"
        command -v sqlite3    >/dev/null 2>&1 || pkgs="$pkgs sqlite3"
        command -v go         >/dev/null 2>&1 || pkgs="$pkgs golang"
        if [ -n "$pkgs" ]; then sudo apt update && sudo apt install -y $pkgs; fi
      - command -v cargo >/dev/null 2>&1 || (curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y)
      - |
        source "$HOME/.cargo/env"
        command -v cargo-cinstall >/dev/null 2>&1 || cargo install cargo-c
      - |
        if [ ! -d "$HOME/yara-x" ]; then
          git clone --depth 1 --branch v1.14.0 https://github.com/VirusTotal/yara-x.git $HOME/yara-x
        fi
      - |
        if [ ! -d "$HOME/yara_install" ]; then
          source "$HOME/.cargo/env"
          cd $HOME/yara-x
          cargo cinstall -p yara-x-capi --release --destdir=$HOME/yara_install
        fi
      - |
        PC_FILE=$(find $HOME/yara_install -name yara_x_capi.pc | head -1)
        PC_DIR=$(dirname "$PC_FILE")
        LIB_DIR=$(find $HOME/yara_install -name "libyara_x_capi*" -exec dirname {} \; | head -1)
        echo "PKG_CONFIG_PATH=$PC_DIR" > .yara_env
        PREFIX=$(PKG_CONFIG_PATH=$PC_DIR pkg-config --variable=prefix yara_x_capi)
        echo "CGO_CFLAGS=-I$HOME/yara_install$PREFIX/include" >> .yara_env
        echo "CGO_LDFLAGS=-L$LIB_DIR" >> .yara_env
        echo "Setup complete. YARA-X env written to cmd/ftrove/.yara_env and will be auto-loaded by task."

  clean:
    desc: Delete builds and test files
    cmds:
      - rm -f ftrove
      - rm -f ftrove_*
      - rm -rf logs
      - rm -f *.tsv
      - mv db/nsrl.db . 2>/dev/null || true
      - rm -rf db
