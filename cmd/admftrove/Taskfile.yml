version: '3'

vars:
  VERSION: 1.0.0-BETA-4

env:
  CGO_ENABLED: "1"

includes:
  yara: ../../Taskfile.yara.yml

tasks:
  build:
    desc: Build admftrove binaries (both dynamic and static)
    deps: [yara:setup-capi]
    cmds:
      - go build -ldflags "-X main.Version={{.VERSION}} -w -s" -o admftrove
      - task: build-static
    generates:
      - admftrove

  build-static:
    desc: Build a statically linked admftrove binary
    deps: [yara:setup-capi]
    cmds:
      # -tags static_link is required for yara-x go bindings to use --static pkg-config
      # The extra -extldflags libs are required by CGO (go-sqlite3, yara-x-capi) when linking statically on Linux
      - |
        if [ "{{OS}}" = "linux" ]; then
          go build -tags static_link -ldflags "-X main.Version={{.VERSION}} -w -s -extldflags '-static -lm -ldl -lpthread -lrt -lutil'" -o admftrove_{{ARCH}}_{{OS}}_static
        elif [ "{{OS}}" = "windows" ]; then
          go build -tags static_link -ldflags "-X main.Version={{.VERSION}} -w -s" -o admftrove_{{ARCH}}_{{OS}}_static.exe
        else
          go build -tags static_link -ldflags "-X main.Version={{.VERSION}} -w -s" -o admftrove_{{ARCH}}_{{OS}}_static
        fi
    generates:
      - admftrove_{{ARCH}}_{{OS}}_static

  build-linux-amd:
    desc: Cross-compile for Linux amd64 using zig
    deps: [yara:setup-capi]
    cmds:
      # zig cc is used as the C cross-compiler because it bundles its own sysroot and supports CGO cross-compilation without a separate toolchain
      - go build -buildmode=pie -ldflags "-X main.Version={{.VERSION}} -w -s" -o admftrove-linux
    env:
      GOOS: "linux"
      GOARCH: "amd64"
      CC: "zig cc -target x86_64-linux-musl"
      CXX: "zig cc -target x86_64-linux-musl"

  build-windows-amd:
    desc: Cross-compile for Windows amd64 using zig
    deps: [yara:setup-capi]
    cmds:
      # zig cc is used as the C cross-compiler because it bundles its own sysroot and supports CGO cross-compilation without a separate toolchain
      - go build -buildmode=pie -ldflags "-X main.Version={{.VERSION}} -w -s" -o admftrove.exe
    env:
      GOOS: "windows"
      GOARCH: "amd64"
      CC: "zig cc -target x86_64-windows-musl"
      CXX: "zig cc -target x86_64-windows-musl"

  clean:
    desc: Delete builds
    cmds:
      - rm -f admftrove
      - rm -f admftrove-linux
      - rm -f admftrove.exe
      - rm -f admftrove_*
