version: '3'

vars:
  VERSION:
    sh: cat $(git rev-parse --show-toplevel)/VERSION
  GIT_COMMIT:
    sh: git log -n 1 --format=%h

env:
  CGO_ENABLED: "1"

includes:
  yara: ../../Taskfile.yara.yml

tasks:
  build:
    desc: Build admftrove binaries (both dynamic and static)
    deps: [yara:setup-capi]
    cmds:
      - go build -ldflags "-X main.Version={{.VERSION}}+{{.GIT_COMMIT}} -w -s" -o admftrove
      - task: build-static
    generates:
      - admftrove

  build-static:
    desc: Build a statically linked admftrove binary (Linux and macOS only; Windows lacks a static yara-x-capi library)
    platforms: [linux, darwin]
    deps: [yara:setup-capi]
    cmds:
      # -tags static_link is required for yara-x go bindings to use --static pkg-config
      # The extra -extldflags libs are required by CGO (go-sqlite3, yara-x-capi) when linking statically on Linux
      - |
        if [ "{{OS}}" = "linux" ]; then
          go build -tags static_link -ldflags "-X main.Version={{.VERSION}}+{{.GIT_COMMIT}} -w -s -extldflags '-static -lm -ldl -lpthread -lrt -lutil'" -o admftrove_{{ARCH}}_{{OS}}_static
        else
          go build -tags static_link -ldflags "-X main.Version={{.VERSION}}+{{.GIT_COMMIT}} -w -s" -o admftrove_{{ARCH}}_{{OS}}_static
        fi
    generates:
      - admftrove_{{ARCH}}_{{OS}}_static

  build-linux-amd:
    desc: Cross-compile for Linux amd64 using zig
    deps: [yara:setup-capi]
    cmds:
      # zig cc is used as the C cross-compiler because it bundles its own sysroot and supports CGO cross-compilation without a separate toolchain
      - go build -buildmode=pie -ldflags "-X main.Version={{.VERSION}}+{{.GIT_COMMIT}} -w -s" -o admftrove-linux
    env:
      GOOS: "linux"
      GOARCH: "amd64"
      CC: "zig cc -target x86_64-linux-musl"
      CXX: "zig cc -target x86_64-linux-musl"

  build-windows-amd:
    desc: Cross-compile for Windows amd64 using zig
    deps: [yara:setup-capi]
    cmds:
      # zig cc is used as the C cross-compiler because it bundles its own sysroot and supports CGO cross-compilation without a separate toolchain
      - go build -buildmode=pie -ldflags "-X main.Version={{.VERSION}}+{{.GIT_COMMIT}} -w -s" -o admftrove.exe
    env:
      GOOS: "windows"
      GOARCH: "amd64"
      CC: "zig cc -target x86_64-windows-musl"
      CXX: "zig cc -target x86_64-windows-musl"

  build-mac-amd:
    desc: Cross-compile for macOS amd64 (x86_64) using zig — local dev only, not used by release runners
    deps: [yara:setup-capi]
    cmds:
      - go build -buildmode=pie -ldflags "-X main.Version={{.VERSION}}+{{.GIT_COMMIT}} -w -s" -o admftrove_amd64_darwin
    env:
      GOOS: "darwin"
      GOARCH: "amd64"
      CC: "zig cc -target x86_64-macos"
      CXX: "zig cc -target x86_64-macos"

  build-mac-arm:
    desc: Cross-compile for macOS arm64 (Apple Silicon) using zig — local dev only, not used by release runners
    deps: [yara:setup-capi]
    cmds:
      - go build -buildmode=pie -ldflags "-X main.Version={{.VERSION}}+{{.GIT_COMMIT}} -w -s" -o admftrove_arm64_darwin
    env:
      GOOS: "darwin"
      GOARCH: "arm64"
      CC: "zig cc -target aarch64-macos"
      CXX: "zig cc -target aarch64-macos"

  build-linux-arm:
    desc: Cross-compile for Linux arm64 using zig — local dev only, not used by release runners
    deps: [yara:setup-capi]
    cmds:
      - go build -buildmode=pie -ldflags "-X main.Version={{.VERSION}}+{{.GIT_COMMIT}} -w -s" -o admftrove_arm64_linux
    env:
      GOOS: "linux"
      GOARCH: "arm64"
      CC: "zig cc -target aarch64-linux-musl"
      CXX: "zig cc -target aarch64-linux-musl"

  clean:
    desc: Delete builds
    cmds:
      - rm -f admftrove
      - rm -f admftrove-linux
      - rm -f admftrove.exe
      - rm -f admftrove_*
